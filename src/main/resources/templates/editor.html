<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:inline="javascript">

<head>
    <title>Parth Docs Editor</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- QUILL -->
    <link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>

    <!-- MOBILE FIX -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="bg-gray-100 px-2 sm:px-4 md:px-6 py-4">

<!-- MAIN CONTAINER -->
<div class="max-w-5xl mx-auto bg-white p-3 sm:p-5 md:p-6 rounded-xl shadow">

    <form action="/save" method="post" onsubmit="saveContent()">

        <input type="hidden" name="id" th:value="${note.id}">

        <!-- TITLE -->
        <input type="text"
               name="title"
               th:value="${note.title}"
               placeholder="Title..."
               class="w-full p-2 sm:p-3 text-lg sm:text-xl md:text-2xl border rounded mb-3 sm:mb-4 font-semibold focus:outline-none">

        <!-- TOOLBAR (RESPONSIVE SCROLLABLE) -->
        <div id="toolbar"
             class="overflow-x-auto whitespace-nowrap border rounded p-2 bg-gray-50">

            <span class="ql-formats">
                <select class="ql-font"></select>
                <select class="ql-size"></select>
            </span>

            <span class="ql-formats">
                <button class="ql-bold"></button>
                <button class="ql-italic"></button>
                <button class="ql-underline"></button>
                <button class="ql-strike"></button>
            </span>

            <span class="ql-formats">
                <button class="ql-list" value="ordered"></button>
                <button class="ql-list" value="bullet"></button>
            </span>

            <span class="ql-formats">
                <button class="ql-align" value=""></button>
                <button class="ql-align" value="center"></button>
                <button class="ql-align" value="right"></button>
                <button class="ql-align" value="justify"></button>
            </span>

            <span class="ql-formats">
                <button class="ql-image"></button>
            </span>

        </div>

        <!-- EDITOR -->
        <div id="editor"
             class="bg-white mt-3 border rounded p-2 overflow-y-auto
                    h-[250px] sm:h-[350px] md:h-[450px] lg:h-[500px]">
        </div>

        <!-- HIDDEN CONTENT -->
        <textarea name="content" id="hidden" hidden></textarea>

        <!-- SAVE BUTTON -->
        <button
                class="mt-4 w-full sm:w-auto px-6 py-2 bg-yellow-500 text-white rounded hover:bg-yellow-600 transition">
            Save
        </button>

    </form>

</div>

<script>

    // ✅ INIT QUILL
    const quill = new Quill('#editor', {
        theme: 'snow',
        modules: {
            toolbar: '#toolbar'
        }
    });

    // ✅ LOAD EXISTING CONTENT
    let existing = /*[[${note.content}]]*/ "";

    if (existing && existing !== "null" && existing !== "") {
        quill.root.innerHTML = existing;
    }

    // ✅ SAVE CONTENT
    function saveContent(){
        document.getElementById("hidden").value = quill.root.innerHTML;
    }

</script>

</body>
</html>
