<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Parth Notes</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- MOBILE FIX -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="bg-gray-100 text-gray-800">

<!-- 🔥 NAVBAR -->
<header class="flex items-center justify-between px-3 sm:px-6 md:px-8 py-3 sm:py-4 bg-white shadow-md">

    <h1 class="text-lg sm:text-xl md:text-2xl lg:text-3xl font-bold text-yellow-600">
        📝 Parth Notes
    </h1>

    <div class="flex items-center gap-2 sm:gap-3">

        <!-- ➕ BUTTON -->
        <a href="/editor"
           class="bg-yellow-500 hover:bg-yellow-600 text-white
                  w-9 h-9 sm:w-11 sm:h-11 md:w-12 md:h-12
                  rounded-full text-lg sm:text-xl flex items-center justify-center shadow-md transition">
            +
        </a>

        <!-- USER ICON -->
        <div class="bg-yellow-500 text-white rounded-full
                    w-9 h-9 sm:w-11 sm:h-11 md:w-12 md:h-12
                    flex items-center justify-center text-sm sm:text-lg font-semibold">
            P
        </div>

    </div>
</header>

<!-- 🔍 SEARCH + MENU -->
<section class="px-3 sm:px-6 md:px-8 mt-4">

    <div class="flex flex-col gap-3 sm:gap-4">

        <!-- SEARCH -->
        <input type="text"
               placeholder="🔍 Search your notes..."
               class="w-full px-4 sm:px-5 py-2 sm:py-3 rounded-full bg-white shadow-md text-sm sm:text-base focus:outline-none">

        <!-- MENU -->
        <div class="flex flex-wrap gap-2 sm:gap-3 justify-center sm:justify-start">

            <a href="/"
               class="px-3 sm:px-4 py-1.5 sm:py-2 rounded-full bg-yellow-500 text-white text-xs sm:text-sm md:text-base">
                📒 Notes
            </a>

            <a href="/archive"
               class="px-3 sm:px-4 py-1.5 sm:py-2 rounded-full bg-gray-200 hover:bg-gray-300 text-xs sm:text-sm md:text-base">
                📦 Archive
            </a>

            <a href="/bin"
               class="px-3 sm:px-4 py-1.5 sm:py-2 rounded-full bg-gray-200 hover:bg-gray-300 text-xs sm:text-sm md:text-base">
                🗑 Bin
            </a>

        </div>

    </div>
</section>

<!-- 🔥 MAIN -->
<main class="px-3 sm:px-6 md:px-8 py-4 sm:py-6">

    <!-- EMPTY -->
    <div th:if="${#lists.isEmpty(notes)}"
         class="text-center text-gray-500 mt-16 sm:mt-20 text-base sm:text-lg">
        🚀 No notes yet. Click ➕ to create one.
    </div>

    <!-- GRID -->
    <div th:if="${!#lists.isEmpty(notes)}"
         class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 sm:gap-5">

        <div th:each="note : ${notes}"
             class="bg-yellow-100 p-3 sm:p-4 md:p-5 rounded-2xl shadow-md hover:shadow-xl transition duration-300 flex flex-col justify-between">

            <!-- TITLE -->
            <h3 class="font-bold text-base sm:text-lg md:text-xl mb-2 break-words"
                th:text="${note.title}"></h3>

            <!-- CONTENT -->
            <div class="text-xs sm:text-sm md:text-base leading-relaxed break-words overflow-hidden max-h-28 sm:max-h-32">
            </div>

            <!-- DATE -->
            <p class="text-[10px] sm:text-xs text-gray-500 mt-3 sm:mt-4"
               th:text="${note.createdAt}"></p>

            <!-- ACTIONS -->
            <div class="mt-3 sm:mt-4 flex flex-wrap gap-1 sm:gap-2">

                <!-- ACTIVE -->
                <div th:if="${view == 'active'}" class="flex flex-wrap gap-1 sm:gap-2">

                    <a th:href="@{'/editor/' + ${note.id}}"
                       class="px-2 sm:px-3 py-1 bg-green-500 text-white rounded-lg text-[10px] sm:text-xs md:text-sm hover:bg-green-600">
                        ✏️ Edit
                    </a>

                    <a th:href="@{'/archive/' + ${note.id}}"
                       class="px-2 sm:px-3 py-1 bg-blue-500 text-white rounded-lg text-[10px] sm:text-xs md:text-sm hover:bg-blue-600">
                        📦 Archive
                    </a>

                    <a th:href="@{'/delete/' + ${note.id}}"
                       class="px-2 sm:px-3 py-1 bg-red-500 text-white rounded-lg text-[10px] sm:text-xs md:text-sm hover:bg-red-600">
                        🗑 Delete
                    </a>

                </div>

                <!-- ARCHIVE -->
                <div th:if="${view == 'archive'}" class="flex flex-wrap gap-1 sm:gap-2">

                    <a th:href="@{'/editor/' + ${note.id}}"
                       class="px-2 sm:px-3 py-1 bg-green-500 text-white rounded-lg text-[10px] sm:text-xs md:text-sm hover:bg-green-600">
                        ✏️ Edit
                    </a>

                    <a th:href="@{'/unarchive/' + ${note.id}}"
                       class="px-2 sm:px-3 py-1 bg-blue-500 text-white rounded-lg text-[10px] sm:text-xs md:text-sm hover:bg-blue-600">
                        ↩ Unarchive
                    </a>

                    <a th:href="@{'/delete/' + ${note.id}}"
                       class="px-2 sm:px-3 py-1 bg-red-500 text-white rounded-lg text-[10px] sm:text-xs md:text-sm hover:bg-red-600">
                        🗑 Delete
                    </a>

                </div>

                <!-- BIN -->
                <div th:if="${view == 'bin'}" class="flex flex-wrap gap-1 sm:gap-2">

                    <a th:href="@{'/editor/' + ${note.id}}"
                       class="px-2 sm:px-3 py-1 bg-green-500 text-white rounded-lg text-[10px] sm:text-xs md:text-sm hover:bg-green-600">
                        ✏️ Edit
                    </a>

                    <a th:href="@{'/restore/' + ${note.id}}"
                       class="px-2 sm:px-3 py-1 bg-blue-500 text-white rounded-lg text-[10px] sm:text-xs md:text-sm hover:bg-blue-600">
                        ♻ Restore
                    </a>

                    <a th:href="@{'/permanent-delete/' + ${note.id}}"
                       class="px-2 sm:px-3 py-1 bg-red-700 text-white rounded-lg text-[10px] sm:text-xs md:text-sm hover:bg-red-800">
                        ❌ Delete Forever
                    </a>

                </div>

            </div>

        </div>

    </div>

</main>

</body>
</html>
